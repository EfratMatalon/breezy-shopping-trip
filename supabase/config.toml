project_id = "shopping-pal"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]

[realtime]
enabled = true

[functions.ai-chat]
enabled = true
verify_jwt = false
import_map = "./functions/ai-chat/deno.json"
entrypoint = "./functions/ai-chat/index.ts"
static_files = ["./functions/ai-chat/prompts/*.md"]
